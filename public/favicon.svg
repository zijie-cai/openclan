<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -40 280 280" role="img" aria-label="OpenCLAN clam logo">
  <defs>
    <linearGradient id="bottomShellGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00B4D8" />
      <stop offset="40%" stop-color="#0077B6" />
      <stop offset="100%" stop-color="#03045E" />
    </linearGradient>

    <linearGradient id="topShellGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#90E0EF" />
      <stop offset="50%" stop-color="#00B4D8" />
      <stop offset="100%" stop-color="#0077B6" />
    </linearGradient>

    <radialGradient id="pearlGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="25%" stop-color="#FFF3B0" />
      <stop offset="60%" stop-color="#FFD166" />
      <stop offset="90%" stop-color="#F77F00" />
      <stop offset="100%" stop-color="#D62828" />
    </radialGradient>

    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="heavyGlow" x="-200%" y="-200%" width="500%" height="500%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="shadow" x="-100%" y="-100%" width="300%" height="300%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <g>
    <path d="M 40 110 C 40 70, 160 70, 160 110 Z" fill="#010B1A" />

    <g style="transform-origin: 100px 95px; opacity: 1; transform: scale(1);">
      <circle cx="100" cy="95" r="22" fill="#FFD166" filter="url(#heavyGlow)" opacity="0.5" />
      <circle cx="100" cy="95" r="20" fill="#FFF3B0" filter="url(#glow)" opacity="0.8" />
      <circle cx="100" cy="95" r="18" fill="url(#pearlGrad)" />
      <path d="M 88 85 A 8 8 0 0 1 102 82 A 10 10 0 0 0 88 85 Z" fill="#FFFFFF" opacity="0.9" />
      <circle cx="92" cy="90" r="1.5" fill="#FFFFFF" opacity="0.8" />

      <g fill="#FFFFFF" filter="url(#glow)">
        <path style="transform-origin: 65px 65px; opacity: 1; transform: scale(1) rotate(0deg);" d="M 65 59 Q 65 65 71 65 Q 65 65 65 71 Q 65 65 59 65 Q 65 65 65 59 Z" />
        <path style="transform-origin: 135px 60px; opacity: 1; transform: scale(1) rotate(0deg);" d="M 135 54 Q 135 60 141 60 Q 135 60 135 66 Q 135 60 129 60 Q 135 60 135 54 Z" />
        <path style="transform-origin: 100px 45px; opacity: 1; transform: scale(1) rotate(0deg);" d="M 100 37 Q 100 45 108 45 Q 100 45 100 53 Q 100 45 92 45 Q 100 45 100 37 Z" />
      </g>
    </g>

    <g filter="url(#shadow)">
      <path d="M 30 110 C 30 170, 170 170, 170 110 C 140 125, 60 125, 30 110 Z" fill="url(#bottomShellGrad)" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.4" />
      <path d="M 30 110 C 60 125, 140 125, 170 110 C 140 118, 60 118, 30 110 Z" fill="#00E5FF" opacity="0.5" />

      <g fill="#03045E">
        <circle cx="80" cy="135" r="4.5" />
        <circle cx="81" cy="133.5" r="1.5" fill="#FFFFFF" />
        <circle cx="120" cy="135" r="4.5" />
        <circle cx="121" cy="133.5" r="1.5" fill="#FFFFFF" />
        <path d="M 95 142 Q 100 148 105 142" stroke="#03045E" stroke-width="2" fill="none" stroke-linecap="round" />
        <circle cx="68" cy="138" r="4" fill="#90E0EF" opacity="0.4" />
        <circle cx="132" cy="138" r="4" fill="#90E0EF" opacity="0.4" />
      </g>
    </g>

    <g filter="url(#shadow)" style="transform-origin: 30px 110px; transform: rotate(-42deg);">
      <path d="M 30 110 C 10 60, 50 20, 100 20 C 150 20, 190 60, 170 110 C 140 100, 60 100, 30 110 Z" fill="url(#topShellGrad)" stroke="#00E5FF" stroke-width="1.5" stroke-opacity="0.6" />
      <path d="M 60 40 Q 70 80 75 105" stroke="#03045E" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round" />
      <path d="M 100 25 L 100 102" stroke="#03045E" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round" />
      <path d="M 140 40 Q 130 80 125 105" stroke="#03045E" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round" />
      <path d="M 45 90 C 40 50, 80 30, 100 30" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round" />
    </g>
  </g>
</svg>
